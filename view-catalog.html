<!DOCTYPE html>

<style>

@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');


*{

}


body{

font-family:Vazirmatn,Tahoma,sans-serif;

background:linear-gradient(135deg,#e8f7f0,#cfeee0);

color:#17372d;

}



.container{

max-width:700px;

margin:auto;

padding:20px 14px 35px;

text-align:center;

}



.logo{

width:90px;

height:90px;

object-fit:cover;

border-radius:50%;

background:white;

padding:7px;

box-shadow:0 8px 20px rgba(0,0,0,.15);

}





h1{

font-size:24px;

color:#176b4a;

}



.desc{

font-size:14px;

line-height:2;

color:#555;

}





.pdf-box{

background:white;

border-radius:25px;

padding:12px;

margin-top:20px;

box-shadow:0 10px 30px rgba(0,0,0,.15);

border:2px solid rgba(23,107,74,.15);

}




iframe{

height:75vh;

border:none;

}





.order-btn{

margin:25px auto 10px;

text-decoration:none;

padding:15px;

}




.back{

margin-top:15px;

text-decoration:none;

}



.footer{

font-weight:600;

}

height:65vh;

}


h1{

font-size:21px;

}


}

.order-btn{

display:block;

background:#176b4a;

color:white;

text-decoration:none;

padding:14px;

border-radius:18px;

font-size:16px;

font-weight:bold;

margin:18px auto;

max-width:400px;

box-shadow:0 8px 20px rgba(23,107,74,.25);

transition:.3s;

}


.order-btn:hover{

transform:translateY(-2px);

}

.back{

display:inline-flex;

align-items:center;

justify-content:center;

background:#176b4a;

color:white;

text-decoration:none;

padding:13px 28px;

border-radius:22px;

}


.back:hover{

transform:translateY(-4px);

}
