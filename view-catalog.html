<!DOCTYPE html>

<title>مشاهده کاتالوگ محصولات مهدوی</title>


<style>

@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');


*{
box-sizing:border-box;
}


body{

margin:0;

font-family:Vazirmatn,Tahoma,sans-serif;

background:linear-gradient(135deg,#e8f7f0,#cfeee0);

min-height:100vh;

color:#17372d;

}



.container{

max-width:700px;

margin:auto;

padding:20px 14px 35px;

text-align:center;

}



.logo{

width:90px;

height:90px;

object-fit:cover;

border-radius:50%;

background:white;

padding:7px;

box-shadow:0 8px 20px rgba(0,0,0,.15);

}





h1{

font-size:24px;

color:#176b4a;

}



.desc{

font-size:14px;

line-height:2;

color:#555;

}





.pdf-box{

background:white;

border-radius:25px;

padding:12px;

margin-top:20px;

box-shadow:0 10px 30px rgba(0,0,0,.15);

border:2px solid rgba(23,107,74,.15);

}




iframe{

width:100%;

height:75vh;

border:none;

border-radius:18px;

}





.order-btn{

display:block;

margin:25px auto 10px;

background:#176b4a;

color:white;

text-decoration:none;

padding:15px;

border-radius:18px;

font-size:17px;

font-weight:bold;

box-shadow:0 8px 20px rgba(23,107,74,.3);

}




.back{

display:block;

margin-top:15px;

color:#176b4a;

text-decoration:none;

}



.footer{

margin-top:20px;

color:#176b4a;

font-weight:600;

}





@media(max-width:600px){


iframe{

height:65vh;

}


h1{

font-size:21px;

}


}

</style>

</head>


<body>


<div class="container">



<img class="logo"

</div>





<div class="pdf-box">


<iframe
